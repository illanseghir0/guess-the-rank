name: Refresh Letterboxd lists

# Les listes officielles Letterboxd sont refaites ~chaque semaine :
# on ré-ingère chaque lundi matin et on upserte directement la table
# `lists` (clé service_role dans les secrets — jamais côté client).
# Le cache client (localStorage) expire en 24 h : les joueurs voient
# la mise à jour au plus tard le mardi.

on:
  schedule:
    - cron: "0 6 * * 1" # lundi 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # cache des métadonnées film (affiche/réalisateur par slug) :
      # seuls les films nouveaux dans les listes sont re-scrapés
      - uses: actions/cache@v4
        with:
          path: scripts/.meta_cache.json
          key: lb-meta-${{ github.run_id }}
          restore-keys: lb-meta-
      - run: pip install requests beautifulsoup4
      - run: python3 scripts/ingest_lists.py --push
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
